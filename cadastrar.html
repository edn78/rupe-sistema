<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RUPE - Criar Conta</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Arial", sans-serif; }
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
    }
    .login-box {
      width: 100%;
      max-width: 420px;
      padding: 40px 35px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
    }
    .logo {
      width: 85px;
      height: 85px;
      margin: 0 auto 15px auto;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 36px;
      background: #0b2c5f;
      color: white;
    }
    h1 { font-size: 28px; color: #0b2c5f; margin-bottom: 6px; }
    .subtitulo { font-size: 13px; color: #64748b; margin-bottom: 25px; }
    .campo { margin-bottom: 16px; text-align: left; }
    .campo label { font-size: 13px; font-weight: bold; color: #334155; display: block; margin-bottom: 6px; }
    .campo input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      font-size: 14px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-voltar {
      background: linear-gradient(135deg, #64748b, #475569);
      margin-top: 10px;
    }
    .btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
    .msg { margin-top: 15px; font-size: 13px; min-height: 18px; }
    .erro { color: #b91c1c; }
    .ok { color: #15803d; }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-box">
  <div class="logo">⚖️</div>
  <h1>🔐 Criar Conta</h1>
  <div class="subtitulo">Cadastre-se para acessar o sistema</div>

  <div class="campo">
    <label>👤 USUÁRIO</label>
    <input type="text" id="usuario" placeholder="Escolha um usuário">
  </div>

  <div class="campo">
    <label>🔒 SENHA</label>
    <input type="password" id="senha" placeholder="Digite sua senha">
  </div>

  <div class="campo">
    <label>✅ CONFIRMAR SENHA</label>
    <input type="password" id="confirmar" placeholder="Confirme sua senha">
  </div>

  <div class="campo">
    <label>📛 NOME COMPLETO</label>
    <input type="text" id="nome" placeholder="Digite seu nome completo">
  </div>

  <button class="btn" onclick="cadastrar()">CADASTRAR</button>
  <button class="btn btn-voltar" onclick="voltar()">⬅ VOLTAR</button>

  <div id="msg" class="msg"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw-uN5yhNx_J-naB830EGpMT801UMMDczf74SHP4us/exec";

function mostrarMensagem(texto, tipo) {
  const msg = document.getElementById("msg");
  msg.innerHTML = texto;
  msg.className = "msg " + tipo;
  setTimeout(() => { msg.innerHTML = ""; msg.className = "msg"; }, 3000);
}

function voltar() {
  window.location.href = "login.html";
}

async function cadastrar() {
  const usuario = document.getElementById("usuario").value.trim();
  const senha = document.getElementById("senha").value.trim();
  const confirmar = document.getElementById("confirmar").value.trim();
  const nome = document.getElementById("nome").value.trim();
  const btn = document.querySelector(".btn");

  if (!usuario || !senha || !confirmar || !nome) {
    mostrarMensagem("❌ Preencha todos os campos", "erro");
    return;
  }

  if (senha !== confirmar) {
    mostrarMensagem("❌ As senhas não coincidem", "erro");
    return;
  }

  if (senha.length < 4) {
    mostrarMensagem("❌ A senha deve ter pelo menos 4 caracteres", "erro");
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Cadastrando...';

  try {
    const response = await fetch(`${API_URL}?acao=cadastrar&usuario=${encodeURIComponent(usuario)}&senha=${encodeURIComponent(senha)}&nome=${encodeURIComponent(nome)}`);
    const r = await response.json();

    btn.disabled = false;
    btn.innerHTML = "CADASTRAR";

    if (r.sucesso) {
      mostrarMensagem("✅ " + r.mensagem, "ok");
      setTimeout(() => { window.location.href = "login.html"; }, 1500);
    } else {
      mostrarMensagem("❌ " + r.mensagem, "erro");
    }
  } catch (err) {
    btn.disabled = false;
    btn.innerHTML = "CADASTRAR";
    mostrarMensagem("❌ Erro no servidor", "erro");
  }
}
</script>
</body>
</html>
